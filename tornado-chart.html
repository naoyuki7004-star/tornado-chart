<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トルネードチャート | 感度分析ツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f5f6fa; color: #2d3436; }
  h1 { font-size: 1.4rem; font-weight: 700; color: #2d3436; }
  .subtitle { font-size: 0.85rem; color: #636e72; margin-top: 2px; }

  header { background: #fff; padding: 16px 24px; border-bottom: 1px solid #dfe6e9; display: flex; align-items: center; gap: 12px; }
  .icon { width: 36px; height: 36px; background: #0984e3; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .icon svg { fill: white; }

  main { display: flex; gap: 0; min-height: calc(100vh - 61px); }

  /* --- 左パネル --- */
  .panel { width: 360px; min-width: 300px; background: #fff; border-right: 1px solid #dfe6e9; display: flex; flex-direction: column; }
  .panel-header { padding: 16px 20px; border-bottom: 1px solid #dfe6e9; }
  .panel-header h2 { font-size: 0.9rem; font-weight: 600; color: #636e72; text-transform: uppercase; letter-spacing: 0.05em; }

  /* アップロードエリア */
  .upload-section { padding: 14px 20px; border-bottom: 1px solid #dfe6e9; }
  .upload-section h3 { font-size: 0.78rem; font-weight: 600; color: #636e72; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .drop-zone { border: 2px dashed #b2bec3; border-radius: 8px; padding: 16px 12px; text-align: center; cursor: pointer; transition: all 0.2s; background: #fafbfc; }
  .drop-zone:hover, .drop-zone.drag-over { border-color: #0984e3; background: #f0f8ff; }
  .drop-zone svg { fill: #b2bec3; margin-bottom: 6px; }
  .drop-zone p { font-size: 0.82rem; color: #636e72; line-height: 1.5; }
  .drop-zone span { font-size: 0.75rem; color: #b2bec3; display: block; margin-top: 4px; }
  .upload-success { background: #e0fff4; border: 1px solid #55efc4; border-radius: 6px; padding: 8px 12px; font-size: 0.8rem; color: #00b894; margin-top: 8px; display: none; }
  .upload-error { background: #fff0ee; border: 1px solid #fab1a0; border-radius: 6px; padding: 8px 12px; font-size: 0.8rem; color: #d63031; margin-top: 8px; display: none; }
  .template-link { font-size: 0.75rem; color: #0984e3; cursor: pointer; text-decoration: underline; margin-top: 6px; display: block; }

  /* ベースケース */
  .baseline-section { padding: 14px 20px; border-bottom: 1px solid #dfe6e9; }
  .baseline-section label { font-size: 0.82rem; color: #636e72; display: block; margin-bottom: 4px; }
  .baseline-section input { width: 100%; padding: 8px 10px; border: 1px solid #dfe6e9; border-radius: 6px; font-size: 0.9rem; }
  .baseline-section input:focus { outline: none; border-color: #0984e3; }

  /* 変数カード */
  .vars-section { flex: 1; overflow-y: auto; padding: 12px 20px; }
  .var-card { background: #f8f9fa; border: 1px solid #dfe6e9; border-radius: 8px; padding: 12px; margin-bottom: 10px; position: relative; }
  .var-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .var-label { font-size: 0.78rem; font-weight: 600; color: #0984e3; }
  .btn-remove { background: none; border: none; cursor: pointer; color: #b2bec3; font-size: 1rem; padding: 2px 6px; border-radius: 4px; transition: color 0.15s; }
  .btn-remove:hover { color: #d63031; }
  .var-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .field { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .field label { font-size: 0.75rem; color: #636e72; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .field input { padding: 6px 8px; border: 1px solid #dfe6e9; border-radius: 5px; font-size: 0.85rem; background: #fff; width: 100%; min-width: 0; }
  .field input:focus { outline: none; border-color: #0984e3; }

  .btn-add { margin: 0 20px 12px; padding: 10px; background: none; border: 2px dashed #b2bec3; border-radius: 8px; color: #636e72; cursor: pointer; font-size: 0.85rem; transition: all 0.15s; width: calc(100% - 40px); }
  .btn-add:hover { border-color: #0984e3; color: #0984e3; }

  .btn-draw { margin: 0 20px 20px; padding: 12px; background: #0984e3; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 600; width: calc(100% - 40px); transition: background 0.15s; }
  .btn-draw:hover { background: #0773c5; }

  /* --- チャートエリア --- */
  .chart-area { flex: 1; padding: 28px 32px; overflow-y: auto; }
  .chart-area h2 { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
  .chart-area .desc { font-size: 0.82rem; color: #636e72; margin-bottom: 20px; }
  .chart-wrap { background: #fff; border: 1px solid #dfe6e9; border-radius: 12px; padding: 24px; }
  .empty-state { text-align: center; padding: 60px 20px; color: #b2bec3; }
  .empty-state svg { width: 56px; height: 56px; fill: #dfe6e9; margin-bottom: 12px; }
  .empty-state p { font-size: 0.9rem; }

  /* SVGスタイル */
  .bar-low { fill: #d63031; }
  .bar-high { fill: #0984e3; }
  .axis text { font-size: 11px; fill: #636e72; }
  .axis line, .axis path { stroke: #dfe6e9; }
  .grid line { stroke: #f0f0f0; stroke-dasharray: 3,3; }
  .baseline-line { stroke: #2d3436; stroke-width: 1.5; stroke-dasharray: 4,3; }
  .val-label { font-size: 10.5px; }
  .var-name { font-size: 12px; fill: #2d3436; font-weight: 500; }
  .legend { font-size: 11px; fill: #636e72; }

  input[type="file"] { display: none; }
</style>
</head>
<body>

<header>
  <div class="icon">
    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M3 6h18v2H3V6zm2 5h14v2H5v-2zm3 5h8v2H8v-2z"/></svg>
  </div>
  <div>
    <h1>トルネードチャート</h1>
    <div class="subtitle">感度分析ツール</div>
  </div>
</header>

<main>
  <div class="panel">
    <div class="panel-header"><h2>入力設定</h2></div>

    <!-- アップロードセクション -->
    <div class="upload-section">
      <h3>ファイルから読み込む</h3>
      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <svg viewBox="0 0 24 24" width="28" height="28"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>
        <p>クリックまたはドラッグ＆ドロップ</p>
        <span>Excel (.xlsx) / CSV に対応</span>
      </div>
      <input type="file" id="file-input" accept=".xlsx,.xls,.csv" onchange="handleFile(this.files[0])">
      <div class="upload-success" id="upload-success">✓ 読み込み完了！</div>
      <div class="upload-error" id="upload-error"></div>
      <span class="template-link" onclick="downloadTemplate()">📥 テンプレートCSVをダウンロード</span>
    </div>

    <!-- ベースケース -->
    <div class="baseline-section">
      <label>ベースケース値（基準値）</label>
      <input type="number" id="baseline" value="100" step="any">
    </div>

    <!-- 変数カード -->
    <div class="vars-section" id="vars-container"></div>

    <button class="btn-add" id="btn-add">＋ 変数を手動で追加</button>
    <button class="btn-draw" id="btn-draw">チャートを描画</button>
  </div>

  <!-- チャートエリア -->
  <div class="chart-area">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;">
      <h2>トルネードチャート</h2>
      <button onclick="downloadPNG()" style="padding:6px 14px; background:#fff; border:1px solid #dfe6e9; border-radius:6px; cursor:pointer; font-size:0.82rem; color:#636e72;">📥 PNG保存</button>
    </div>
    <div class="desc">各変数がベースケースに与える影響の大きさを比較します</div>
    <div class="chart-wrap" id="chart-wrap">
      <div class="empty-state" id="empty-state">
        <svg viewBox="0 0 24 24"><path d="M3 6h18v2H3V6zm2 5h14v2H5v-2zm3 5h8v2H8v-2z"/></svg>
        <p>左のパネルに変数を入力するか<br>ファイルをアップロードしてください</p>
      </div>
      <svg id="chart-svg" style="display:none;"></svg>
    </div>
  </div>
</main>

<script>
let varCount = 0;

// ============================================================
// 変数カード
// ============================================================
function addVarCard(name = '', low = '', high = '') {
  varCount++;
  const id = `var-${varCount}`;
  const card = document.createElement('div');
  card.className = 'var-card';
  card.id = id;
  card.innerHTML = `
    <div class="var-card-header">
      <span class="var-label">変数 ${varCount}</span>
      <button class="btn-remove" onclick="removeCard('${id}')" title="削除">✕</button>
    </div>
    <div class="field" style="margin-bottom:8px;">
      <label>変数名</label>
      <input type="text" class="v-name" placeholder="例：販売価格" value="${escVal(name)}">
    </div>
    <div class="var-grid">
      <div class="field">
        <label>下限値（悲観）</label>
        <input type="number" class="v-low" placeholder="例：85" value="${low}" step="any">
      </div>
      <div class="field">
        <label>上限値（楽観）</label>
        <input type="number" class="v-high" placeholder="例：115" value="${high}" step="any">
      </div>
    </div>
  `;
  document.getElementById('vars-container').appendChild(card);
}

function escVal(s) { return String(s).replace(/"/g, '&quot;'); }

function removeCard(id) { document.getElementById(id).remove(); }

function clearAllCards() {
  document.getElementById('vars-container').innerHTML = '';
  varCount = 0;
}

// ============================================================
// ファイル読み込み
// ============================================================
function handleFile(file) {
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  const reader = new FileReader();

  if (ext === 'csv') {
    reader.onload = e => parseCSV(e.target.result);
    reader.readAsText(file, 'UTF-8');
  } else if (ext === 'xlsx' || ext === 'xls') {
    reader.onload = e => parseExcel(e.target.result);
    reader.readAsArrayBuffer(file);
  } else {
    showError('Excel (.xlsx) か CSV ファイルを選択してください');
  }
}

function parseCSV(text) {
  const lines = text.trim().split('\n').map(l => l.split(',').map(c => c.trim().replace(/^"|"$/g, '')));
  if (lines.length < 2) { showError('データが見つかりません'); return; }
  loadRows(lines[0], lines.slice(1));
}

function parseExcel(arrayBuffer) {
  try {
    const wb = XLSX.read(arrayBuffer, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    if (rows.length < 2) { showError('データが見つかりません'); return; }
    loadRows(rows[0].map(String), rows.slice(1));
  } catch(e) { showError('ファイルの読み込みに失敗しました'); }
}

// 列名マッピング（日英両対応）
const COL_MAP = {
  name:  ['変数名', '変数', 'name', 'variable', 'item', '項目'],
  base:  ['ベース値', 'ベースケース', 'base', 'baseline', '基準値', 'base value'],
  low:   ['下限', '下限値', '悲観', 'low', 'min', 'pessimistic'],
  high:  ['上限', '上限値', '楽観', 'high', 'max', 'optimistic'],
};

function findCol(headers, keys) {
  return headers.findIndex(h => keys.some(k => h.toString().toLowerCase().trim() === k.toLowerCase()));
}

function loadRows(headers, dataRows) {
  const hi = headers.map(h => h.toString().toLowerCase().trim());
  const iName = findCol(hi, COL_MAP.name);
  const iBase = findCol(hi, COL_MAP.base);
  const iLow  = findCol(hi, COL_MAP.low);
  const iHigh = findCol(hi, COL_MAP.high);

  if (iName === -1 || iLow === -1 || iHigh === -1) {
    showError('列名が見つかりません。「変数名・下限・上限」の列が必要です');
    return;
  }

  // ベース値が列にあれば反映
  if (iBase !== -1) {
    const firstBase = parseFloat(dataRows[0]?.[iBase]);
    if (!isNaN(firstBase)) document.getElementById('baseline').value = firstBase;
  }

  clearAllCards();
  let loaded = 0;
  for (const row of dataRows) {
    const name = row[iName]?.toString().trim();
    const low  = parseFloat(row[iLow]);
    const high = parseFloat(row[iHigh]);
    if (!name || isNaN(low) || isNaN(high)) continue;
    addVarCard(name, low, high);
    loaded++;
  }

  if (loaded === 0) { showError('有効なデータ行が見つかりません'); return; }

  document.getElementById('upload-success').style.display = 'block';
  document.getElementById('upload-success').textContent = `✓ ${loaded}件 読み込み完了！`;
  document.getElementById('upload-error').style.display = 'none';
  drawChart();
}

function showError(msg) {
  const el = document.getElementById('upload-error');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
  document.getElementById('upload-success').style.display = 'none';
}

// ============================================================
// ドラッグ＆ドロップ
// ============================================================
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});

// ============================================================
// テンプレートCSVダウンロード
// ============================================================
function downloadTemplate() {
  const csv = '変数名,ベース値,下限,上限\n販売価格,100,85,115\n販売数量,100,90,110\n変動費,100,95,105\n';
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tornado_template.csv';
  a.click();
}

// ============================================================
// チャート描画
// ============================================================
function drawChart() {
  const baseline = parseFloat(document.getElementById('baseline').value);
  if (isNaN(baseline)) { alert('ベースケース値を入力してください'); return; }

  const cards = document.querySelectorAll('.var-card');
  const data = [];
  for (const card of cards) {
    const name = card.querySelector('.v-name').value.trim();
    const low  = parseFloat(card.querySelector('.v-low').value);
    const high = parseFloat(card.querySelector('.v-high').value);
    if (!name || isNaN(low) || isNaN(high)) continue;
    data.push({ name, low, high, rangeLow: low - baseline, rangeHigh: high - baseline });
  }
  if (data.length === 0) { alert('有効な変数を1つ以上入力してください'); return; }

  data.sort((a, b) => Math.abs(b.rangeHigh - b.rangeLow) - Math.abs(a.rangeHigh - a.rangeLow));
  renderChart(data, baseline);
}

function renderChart(data, baseline) {
  document.getElementById('empty-state').style.display = 'none';
  const svg = document.getElementById('chart-svg');
  svg.style.display = 'block';
  svg.innerHTML = '';

  const margin = { top: 40, right: 20, bottom: 50, left: 140 };
  const barHeight = 40;
  const barGap = 12;
  const innerH = data.length * (barHeight + barGap) - barGap;
  const totalW = Math.max(svg.parentElement.clientWidth - 48, 400);
  const totalH = innerH + margin.top + margin.bottom;
  const W = totalW - margin.left - margin.right;

  svg.setAttribute('width', totalW);
  svg.setAttribute('height', totalH);

  const g = d3.select(svg).append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  const allVals = data.flatMap(d => [d.rangeLow, d.rangeHigh]);
  const xMax = Math.max(Math.abs(d3.min(allVals)), Math.abs(d3.max(allVals))) * 1.18;
  const xScale = d3.scaleLinear().domain([-xMax, xMax]).range([0, W]);

  // グリッド
  g.append('g').attr('class', 'grid')
    .call(d3.axisBottom(xScale).ticks(6).tickSize(-innerH).tickFormat(''))
    .attr('transform', `translate(0,${innerH})`);

  // ゼロ線
  g.append('line').attr('class', 'baseline-line')
    .attr('x1', xScale(0)).attr('x2', xScale(0))
    .attr('y1', -8).attr('y2', innerH + 8);

  data.forEach((d, i) => {
    const y = i * (barHeight + barGap);
    const midY = y + barHeight / 2;

    // 下限バー（赤）
    if (d.rangeLow < 0) {
      const bw = xScale(0) - xScale(d.rangeLow);
      g.append('rect').attr('class', 'bar-low')
        .attr('x', xScale(d.rangeLow)).attr('y', y)
        .attr('width', bw).attr('height', barHeight).attr('rx', 3);
      // ラベルをバー内に
      if (bw > 50) {
        g.append('text').attr('fill', '#fff').attr('font-size', 10.5).attr('font-weight', '600')
          .attr('x', xScale(d.rangeLow) + bw / 2).attr('y', midY)
          .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
          .text(`${d.low} (${d.rangeLow.toFixed(1)})`);
      }
    }

    // 上限バー（青）
    if (d.rangeHigh > 0) {
      const bw = xScale(d.rangeHigh) - xScale(0);
      g.append('rect').attr('class', 'bar-high')
        .attr('x', xScale(0)).attr('y', y)
        .attr('width', bw).attr('height', barHeight).attr('rx', 3);
      // ラベルをバー内に
      if (bw > 50) {
        g.append('text').attr('fill', '#fff').attr('font-size', 10.5).attr('font-weight', '600')
          .attr('x', xScale(0) + bw / 2).attr('y', midY)
          .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
          .text(`${d.high} (+${d.rangeHigh.toFixed(1)})`);
      }
    }

    // 変数名（左）
    g.append('text').attr('class', 'var-name')
      .attr('x', -10).attr('y', midY + 1)
      .attr('text-anchor', 'end').attr('dominant-baseline', 'middle')
      .text(d.name);
  });

  // X軸
  const xAxis = d3.axisBottom(xScale).ticks(6).tickFormat(d => (d > 0 ? '+' : '') + d);
  g.append('g').attr('class', 'axis').attr('transform', `translate(0,${innerH})`).call(xAxis);

  g.append('text').attr('fill', '#636e72').attr('font-size', 11)
    .attr('x', W / 2).attr('y', innerH + 42).attr('text-anchor', 'middle')
    .text('ベースケースからの変動');

  // 凡例
  const legendY = -28;
  g.append('rect').attr('x', 0).attr('y', legendY - 7).attr('width', 12).attr('height', 12).attr('fill', '#d63031').attr('rx', 2);
  g.append('text').attr('class', 'legend').attr('x', 16).attr('y', legendY + 1).attr('dominant-baseline', 'middle').text('下限（悲観シナリオ）');
  g.append('rect').attr('x', 130).attr('y', legendY - 7).attr('width', 12).attr('height', 12).attr('fill', '#0984e3').attr('rx', 2);
  g.append('text').attr('class', 'legend').attr('x', 146).attr('y', legendY + 1).attr('dominant-baseline', 'middle').text('上限（楽観シナリオ）');
}

// ============================================================
// PNG保存
// ============================================================
function downloadPNG() {
  const svg = document.getElementById('chart-svg');
  if (svg.style.display === 'none') { alert('先にチャートを描画してください'); return; }

  const svgData = new XMLSerializer().serializeToString(svg);
  const canvas = document.createElement('canvas');
  const scale = 2; // 高解像度
  canvas.width  = parseInt(svg.getAttribute('width'))  * scale;
  canvas.height = parseInt(svg.getAttribute('height')) * scale;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.scale(scale, scale);

  const img = new Image();
  const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  img.onload = () => {
    ctx.drawImage(img, 0, 0);
    const a = document.createElement('a');
    a.download = 'tornado-chart.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
    URL.revokeObjectURL(img.src);
  };
  img.src = URL.createObjectURL(blob);
}

// ============================================================
// 初期化
// ============================================================
const defaultVars = [
  { name: '販売価格', low: 85, high: 115 },
  { name: '販売数量', low: 90, high: 110 },
  { name: '変動費',   low: 95, high: 105 },
];
defaultVars.forEach(v => addVarCard(v.name, v.low, v.high));
document.getElementById('btn-add').addEventListener('click', () => addVarCard());
document.getElementById('btn-draw').addEventListener('click', drawChart);
window.addEventListener('load', drawChart);
</script>
</body>
</html>
